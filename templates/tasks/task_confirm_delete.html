{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card body p-4">
                <h1 class="h3 mb-3">Aufgabe löschen</h1>
                <p>Möchtest du die Aufgabe <strong>"{{ task.title }}</strong> wirklich löschen??</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-danger">Ja</button>
                        <a href="{% url 'task_list' %}" class="btn-outline-secondary">Abbrechen</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
