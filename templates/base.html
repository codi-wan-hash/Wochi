<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OurWeek</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">OurWeek</a>

        {% if user.is_authenticated %}
        <div class="navbar-nav ms-4">
            <a class="nav-link" href="{% url 'task_list' %}">To-dos</a>
            <a class="nav-link" href="{% url 'meal_list' %}">Essensplanung</a>
            <a class="nav-link" href="{% url 'recipe_list' %}">Gerichte</a>
            <a class="nav-link" href="{% url 'shopping_list' %}">Einkaufsliste</a>
        </div>
        {% endif %}

        <div class="ms-auto d-flex align-items-center gap-3">
            {% if user.is_authenticated %}
                <span class="text-white small">Hallo, {{ user.username }}</span>
                <form method="post" action="{% url 'logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container py-5">
    {% block content %}{% endblock %}
</main>

</body>
</html>
